services:
  - type: web
    name: max-drive
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    envVars:
      - key: VITE_API_URL
        value: https://max-drive-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
